<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      function showAlert() {
        alert("hello!");
      }
      document.getElementById("mybutton").addEventListener(showAlert);
    </script>
  </head>
  <body>
    <h1>Hello from my page!</h1>
    <button id="mybutton" onclick="showAlert">Press Me!</button>
  </body>
</html>
