<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      function showAlert() {
        document.getElementById("mycontent").innerHTML = "Button pressed!";
      }
    </script>
  </head>
  <body>
    <h1>Hello from my page!</h1>
    <button id="mybutton" onclick="showAlert()">Click Me!</button>
    <p id="mycontent"></p>
  </body>
</html>
