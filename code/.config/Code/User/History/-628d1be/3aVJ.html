<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF8" />
  </head>
  <body>
    <script>
      function showMessage() {
        document.getElementById("content").innerHTML = "Welcome!";
      }
    </script>

    <h1>Hello from my web page!</h1>
    <button onclick="showMessage()">Click me!</button>
    <p id="content"></p>
  </body>
</html>
