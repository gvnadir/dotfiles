<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF8" />
  </head>
  <body>
    <script>
      let count = 0;
      function increment() {
        count += 1;
        document.getElementById("mybutton").innerHTML = count;
      }
    </script>

    <h1>Hello from my web page!</h1>
    <button id="mybutton" onclick="increment()">Clicked</button>
  </body>
</html>
